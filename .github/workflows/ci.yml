name: kemik

# Bekçi: her push/PR'da kontrat testleri + tip denetimi + production build.
# Bunlar yeşil olmadan merge/deploy yok.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest # Hetzner hedefiyle aynı aile: Debian/amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
