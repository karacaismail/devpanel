name: atonota-pages

# atonota'yı (Vite + JSON engine) GitHub Pages'e build + deploy eder.
# Sandbox'ta /tmp uçucu olduğundan build CI'da (GitHub sunucusu) koşar.
on:
  push:
    branches: ["main"]
    paths: ["atonota/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atonota
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: Test (yalnız atonota)
        run: npx vitest run --config vitest.config.ts
      - name: Build (base=/devpanel/)
        run: GHPAGES=1 npx vite build
      - name: SPA fallback
        run: cp dist/index.html dist/404.html && touch dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: atonota/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
